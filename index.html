<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>运维命令速查</title>
<style>
:root{
  --bg:#eef2f6;--surface:#fff;--surface-2:#f8fafc;--hover:#f1f5f9;
  --divider:rgba(15,23,42,.09);--text:#0f172a;--muted:#64748b;--dim:#94a3b8;
  --accent:#2563eb;--accent-bg:rgba(37,99,235,.09);
  --k8s:#326ce5;--ctr:#ea580c;--cri:#7c3aed;--nerd:#059669;--host:#0d9488;
  --mono:ui-monospace,'Cascadia Code','Consolas',monospace;
  --sans:system-ui,-apple-system,'Segoe UI','PingFang SC',sans-serif;
  --side:276px;--header:58px;--subhead:44px;--gap:12px;--radius:10px;
}
html,body{height:100%;width:100%}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);font-family:var(--sans);overflow:hidden;
}
.shell{
  display:flex;flex-direction:column;height:100vh;width:100vw;max-width:100%;
  padding:0 var(--gap) var(--gap);gap:var(--gap);
}
.header{
  flex-shrink:0;display:flex;align-items:center;gap:12px;
  padding:8px 2px 4px;height:var(--header);
  background:transparent;
}
.brand{flex-shrink:0;min-width:0}
.brand h1{font-size:18px;font-weight:750;letter-spacing:0;white-space:nowrap}
.brand p{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search{
  flex:1;min-width:160px;display:flex;align-items:center;gap:8px;
  background:var(--surface);border:0;border-radius:8px;
  padding:0 12px;height:36px;
  box-shadow:0 1px 2px rgba(15,23,42,.06),inset 0 0 0 1px var(--divider);
  transition:box-shadow .2s;
}
.search:focus-within{box-shadow:0 0 0 3px var(--accent-bg),inset 0 0 0 1px rgba(37,99,235,.35)}
.search input{flex:1;border:0;background:transparent;font-size:13px;outline:0;min-width:0}
.search input::placeholder{color:var(--dim)}
.tools{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.tool-tab{
  padding:7px 12px;border-radius:8px;border:0;
  background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;
  color:var(--muted);white-space:nowrap;transition:.18s;
  box-shadow:inset 0 0 0 1px var(--divider);
}
.tool-tab:hover{color:var(--text);background:#fff}
.tool-tab.active{color:#fff;box-shadow:0 2px 8px rgba(15,23,42,.12)}
.tool-tab[data-tool="k8s"].active{background:var(--k8s)}
.tool-tab[data-tool="ctr"].active{background:var(--ctr)}
.tool-tab[data-tool="crictl"].active{background:var(--cri)}
.tool-tab[data-tool="nerdctl"].active{background:var(--nerd)}
.tool-tab[data-tool="host"].active{background:var(--host)}
.ai-open-btn{
  padding:7px 12px;border-radius:8px;border:0;cursor:pointer;
  font-size:12px;font-weight:700;color:#475569;white-space:nowrap;
  background:var(--surface);box-shadow:inset 0 0 0 1px var(--divider);transition:.18s;
}
.ai-open-btn:hover{color:#4f46e5;background:#fff;transform:translateY(-1px)}
.ai-backdrop{
  position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:9000;
  opacity:0;pointer-events:none;transition:opacity .22s;
}
.ai-backdrop.show{opacity:1;pointer-events:auto}
.ai-drawer{
  position:fixed;top:0;right:0;width:min(480px,100vw);height:100vh;z-index:9001;
  background:var(--surface);display:flex;flex-direction:column;
  box-shadow:-8px 0 32px rgba(15,23,42,.15);
  transform:translateX(100%);transition:transform .28s ease;
}
.ai-drawer.open{transform:translateX(0)}
.ai-drawer-head{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--divider);
  background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;
}
.ai-drawer-head h2{font-size:15px;font-weight:700}
.ai-drawer-close{
  border:0;background:rgba(255,255,255,.2);color:#fff;width:32px;height:32px;
  border-radius:8px;cursor:pointer;font-size:18px;line-height:1;
}
.ai-drawer-close:hover{background:rgba(255,255,255,.35)}
.ai-drawer-body{flex:1;overflow-y:auto;padding:14px 16px 20px;display:flex;flex-direction:column;gap:12px}
.ai-settings{
  border-radius:10px;background:var(--surface-2);padding:10px 12px;
  box-shadow:inset 0 0 0 1px var(--divider);font-size:12px;
}
.ai-settings summary{cursor:pointer;font-weight:600;color:var(--text);user-select:none}
.ai-settings-grid{display:grid;gap:8px;margin-top:10px}
.ai-settings-grid label{display:flex;flex-direction:column;gap:4px;color:var(--muted);font-size:11px}
.ai-settings-grid input{
  font-size:12px;padding:8px 10px;border-radius:8px;border:0;
  background:#fff;box-shadow:inset 0 0 0 1px var(--divider);outline:0;
}
.ai-settings-grid input:focus{box-shadow:inset 0 0 0 1px rgba(99,102,241,.5),0 0 0 3px rgba(99,102,241,.12)}
.ai-hint{font-size:11px;color:var(--dim);line-height:1.5}
.ai-prompt label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px}
.ai-prompt textarea{
  width:100%;min-height:88px;resize:vertical;font-size:13px;line-height:1.5;
  padding:10px 12px;border-radius:10px;border:0;font-family:var(--sans);
  box-shadow:inset 0 0 0 1px var(--divider);outline:0;
}
.ai-prompt textarea:focus{box-shadow:inset 0 0 0 1px rgba(99,102,241,.45),0 0 0 3px rgba(99,102,241,.1)}
.ai-actions{display:flex;gap:8px;flex-wrap:wrap}
.ai-actions button{
  padding:8px 16px;border-radius:8px;border:0;font-size:13px;font-weight:600;cursor:pointer;
}
.ai-generate{color:#fff;background:linear-gradient(135deg,#6366f1,#7c3aed)}
.ai-generate:disabled{opacity:.55;cursor:not-allowed}
.ai-clear{background:var(--surface-2);color:var(--muted);box-shadow:inset 0 0 0 1px var(--divider)}
.ai-status{font-size:12px;color:var(--muted);min-height:18px}
.ai-status.err{color:#dc2626}
.ai-results{display:flex;flex-direction:column;gap:14px}
.ai-playbook{
  border-radius:14px;overflow:hidden;
  box-shadow:0 4px 20px rgba(99,102,241,.1),inset 0 0 0 1px rgba(99,102,241,.12);
  background:var(--surface);
}
.ai-playbook-head{
  padding:14px 16px;
  background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(139,92,246,.08));
  border-bottom:1px solid rgba(99,102,241,.15);
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.ai-playbook-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.4;flex:1}
.ai-playbook-meta{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500}
.ai-copy-all{
  flex-shrink:0;padding:6px 12px;border-radius:8px;border:0;cursor:pointer;
  font-size:11px;font-weight:600;color:#6366f1;background:rgba(99,102,241,.12);
  transition:.15s;white-space:nowrap;
}
.ai-copy-all:hover{background:rgba(99,102,241,.2)}
.ai-steps{padding:12px 14px 14px;display:flex;flex-direction:column;gap:0}
.ai-step{
  display:grid;grid-template-columns:28px 1fr;gap:0 12px;position:relative;
  padding-bottom:16px;
}
.ai-step:last-child{padding-bottom:0}
.ai-step:not(:last-child)::before{
  content:'';position:absolute;left:13px;top:28px;bottom:0;width:2px;
  background:linear-gradient(180deg,rgba(99,102,241,.35),rgba(99,102,241,.08));
}
.ai-step-num{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(99,102,241,.35);position:relative;z-index:1;
}
.ai-step-body{min-width:0}
.ai-step-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.ai-step-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.ai-step-cmd{
  font-family:var(--mono);font-size:12px;line-height:1.55;color:#0c4a6e;
  padding:10px 12px;word-break:break-all;cursor:pointer;white-space:pre-wrap;
  background:var(--surface-2);border-radius:10px;
  box-shadow:inset 0 0 0 1px rgba(15,23,42,.06);
  transition:background .15s,box-shadow .15s;
}
.ai-step-cmd:hover{background:var(--hover);box-shadow:inset 0 0 0 1px rgba(99,102,241,.25)}
.ai-step-cmd.copied{background:#ecfdf5;box-shadow:inset 0 0 0 1px #86efac}
.ai-clarify{
  border-radius:14px;padding:16px;
  background:linear-gradient(145deg,rgba(99,102,241,.06),rgba(139,92,246,.04));
  box-shadow:inset 0 0 0 1px rgba(99,102,241,.18);
}
.ai-clarify-icon{font-size:20px;margin-bottom:8px;line-height:1}
.ai-clarify-q{font-size:13px;font-weight:600;color:var(--text);line-height:1.55;margin-bottom:12px}
.ai-clarify-opts{display:flex;flex-direction:column;gap:8px}
.ai-clarify-opt{
  text-align:left;padding:10px 14px;border-radius:10px;border:0;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--text);font-family:var(--sans);
  background:#fff;box-shadow:inset 0 0 0 1px var(--divider);
  transition:.15s;line-height:1.45;
}
.ai-clarify-opt:hover{
  background:rgba(99,102,241,.08);box-shadow:inset 0 0 0 1px rgba(99,102,241,.35);
  color:#4f46e5;
}
.ai-clarify-hint{font-size:11px;color:var(--dim);margin-top:12px;line-height:1.5}
.ai-result-fallback{
  border-radius:12px;background:var(--surface-2);padding:12px;
  box-shadow:inset 0 0 0 1px var(--divider);
}
.ai-result-fallback pre{
  font-family:var(--mono);font-size:12px;line-height:1.55;white-space:pre-wrap;
  word-break:break-all;cursor:pointer;padding:8px;border-radius:8px;
}
.ai-result-fallback pre:hover{background:var(--hover)}
.ai-status.loading{color:#6366f1}
.ai-status.loading::before{
  content:'';display:inline-block;width:12px;height:12px;margin-right:6px;
  border:2px solid rgba(99,102,241,.25);border-top-color:#6366f1;
  border-radius:50%;animation:ai-spin .7s linear infinite;vertical-align:-2px;
}
@keyframes ai-spin{to{transform:rotate(360deg)}}
.ai-examples{display:flex;flex-wrap:wrap;gap:6px}
.ai-chip{
  font-size:11px;padding:5px 10px;border-radius:999px;border:0;cursor:pointer;
  background:var(--accent-bg);color:var(--accent);font-weight:500;
  transition:.15s;
}
.ai-chip:hover{background:rgba(37,99,235,.18);transform:translateY(-1px)}
.ai-drawer{width:min(520px,100vw)}
.ai-drawer-body{padding:16px 18px 24px;gap:14px}
.ai-prompt textarea{min-height:96px;border-radius:12px}
.ai-generate{
  box-shadow:0 2px 12px rgba(99,102,241,.35);
  transition:transform .15s,box-shadow .15s;
}
.ai-generate:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.4)}
.ai-new-chat{
  padding:8px 14px;border-radius:8px;border:0;font-size:12px;font-weight:600;
  cursor:pointer;background:transparent;color:var(--muted);
  box-shadow:inset 0 0 0 1px var(--divider);
}
.ai-new-chat:hover{color:var(--text);background:var(--surface-2)}
.workspace{
  flex:1;display:flex;min-height:0;overflow:hidden;width:100%;
  background:var(--surface);border-radius:var(--radius);
  box-shadow:0 10px 30px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
}
.sidebar{
  width:var(--side);flex-shrink:0;display:flex;flex-direction:column;
  background:#f8fafc;
  transition:width .22s ease;
}
.shell.side-collapsed .sidebar{width:0;overflow:hidden}
.side-top{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  height:var(--subhead);padding:0 16px;flex-shrink:0;
  font-size:11px;font-weight:600;color:var(--dim);
  letter-spacing:.04em;border-bottom:1px solid var(--divider);
}
.side-top-hint{font-size:10px;font-weight:500;color:var(--dim);letter-spacing:0}
.side-bar-toggle{
  width:26px;height:26px;border:0;border-radius:6px;
  background:rgba(15,23,42,.06);cursor:pointer;color:var(--muted);font-size:14px;line-height:1;
  flex-shrink:0;transition:.15s;
}
.side-bar-toggle:hover{background:rgba(15,23,42,.1);color:var(--text)}
.shell.side-collapsed .side-bar-toggle{
  position:fixed;left:var(--gap);top:calc(var(--header) + var(--gap) * 2);z-index:20;
  background:var(--surface);box-shadow:0 2px 12px rgba(15,23,42,.12);
}
.side-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 10px 14px}
.side-nav::-webkit-scrollbar{width:5px}
.side-nav::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.side-item{
  display:flex;align-items:center;gap:8px;width:100%;text-align:left;border:0;background:transparent;
  font-family:var(--sans);font-size:13px;color:var(--muted);padding:7px 10px;
  border-radius:7px;cursor:pointer;transition:background .12s,color .12s,border-color .12s;
}
.side-item::before{content:'';width:4px;height:4px;border-radius:50%;background:#cbd5e1;flex-shrink:0}
.side-item:hover{background:var(--hover);color:var(--text)}
.side-item.active{
  background:var(--accent-bg);color:var(--accent);font-weight:600;
  box-shadow:inset 3px 0 0 var(--accent);
}
.side-item.active::before{background:var(--accent)}
.side-item-all{font-weight:600}
.side-item-all::before{display:none}
.side-fold{
  margin:2px 0 4px;border-radius:7px;background:transparent;
  box-shadow:none;overflow:hidden;
}
.side-fold-head{display:flex;align-items:stretch;gap:0;transition:background .15s}
.side-fold-head:hover{background:rgba(255,255,255,.85)}
.side-fold-head.active-parent{background:var(--accent-bg)}
.side-fold-head.active-parent .side-fold-label{color:var(--accent);font-weight:700}
.side-toggle{
  width:32px;flex-shrink:0;border:0;background:transparent;cursor:pointer;
  color:var(--dim);font-size:10px;display:flex;align-items:center;justify-content:center;
  transition:transform .2s,color .12s;
}
.side-toggle:hover{color:var(--accent)}
.side-toggle[aria-expanded="true"]{transform:rotate(90deg)}
.side-fold-label{
  flex:1;min-width:0;border:0;background:transparent;text-align:left;
  font-family:var(--sans);font-size:13px;font-weight:600;color:var(--text);
  padding:9px 4px 9px 0;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.side-fold-count{
  font-size:10px;color:var(--dim);flex-shrink:0;
  background:rgba(15,23,42,.05);border-radius:10px;
  padding:2px 8px;margin:7px 10px 7px 0;font-variant-numeric:tabular-nums;
}
.side-children{display:grid;grid-template-rows:1fr;transition:grid-template-rows .25s ease}
.side-children.collapsed{grid-template-rows:0fr;border-top-color:transparent}
.side-children-inner{overflow:hidden;padding:3px 0 6px 18px}
.side-children .side-item{
  font-size:12px;padding:6px 9px 6px 12px;margin:1px 0;color:var(--muted);
  border-radius:6px;
}
.side-children .side-item::before{width:3px;height:3px}
.side-children .side-item.sub-overview{font-size:11px;color:var(--dim);font-weight:500}
.side-children .side-item.sub-overview::before{background:transparent;border:1px solid #cbd5e1;width:5px;height:5px;border-radius:2px}
.side-children .side-item.active{font-weight:600}
.panel{
  flex:1;min-width:0;display:flex;flex-direction:column;
  background:var(--surface);
  box-shadow:inset 1px 0 0 var(--divider);
}
.panel-head{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px;
  height:var(--subhead);padding:0 20px;
  border-bottom:1px solid var(--divider);
  position:sticky;top:0;z-index:2;background:var(--surface);
}
.panel-head h2{font-size:15px;font-weight:700;letter-spacing:-.02em}
.panel-head-meta{display:flex;align-items:center;gap:12px;flex-shrink:0}
.search-scope{font-size:11px;color:var(--accent);font-weight:500}
.copy-var-toggle{
  display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);
  cursor:pointer;user-select:none;white-space:nowrap;padding:6px 10px;border-radius:8px;
  background:var(--surface);box-shadow:inset 0 0 0 1px var(--divider);transition:.15s;
}
.copy-var-toggle:hover{color:var(--text)}
.copy-var-toggle input{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
.copy-var-toggle.on{color:var(--accent);background:var(--accent-bg);box-shadow:inset 0 0 0 1px rgba(37,99,235,.25)}
.tool-banner{
  font-size:12px;font-weight:700;color:#fff;padding:8px 14px;margin:0 0 10px;
  border-radius:8px;background:linear-gradient(90deg,var(--accent),#3b82f6);
}
.tool-banner[data-tool="k8s"]{background:linear-gradient(90deg,var(--k8s),#4f86e8)}
.tool-banner[data-tool="ctr"]{background:linear-gradient(90deg,var(--ctr),#f97316)}
.tool-banner[data-tool="crictl"]{background:linear-gradient(90deg,var(--cri),#8b5cf6)}
.tool-banner[data-tool="nerdctl"]{background:linear-gradient(90deg,var(--nerd),#10b981)}
.tool-banner[data-tool="host"]{background:linear-gradient(90deg,var(--host),#14b8a6)}
.search-tool-block{margin-bottom:20px}
.search-tool-block:last-child{margin-bottom:0}
.panel-head .count{
  font-size:12px;color:var(--muted);background:var(--surface-2);
  padding:4px 10px;border-radius:8px;font-variant-numeric:tabular-nums;
  box-shadow:inset 0 0 0 1px var(--divider);
}
.panel-body{flex:1;overflow-y:auto;padding:14px 18px 24px;background:var(--surface-2)}
.panel-body::-webkit-scrollbar{width:8px}
.panel-body::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.card{
  border:0;border-radius:8px;margin-bottom:10px;
  overflow:hidden;background:var(--surface);
  box-shadow:0 1px 2px rgba(15,23,42,.04),inset 0 0 0 1px var(--divider);
}
.card:last-child{margin-bottom:0}
.sec-title{
  font-size:12px;font-weight:700;color:#334155;
  padding:8px 14px;background:#fbfdff;border-bottom:1px solid var(--divider);
}
.sub-title{font-size:11px;font-weight:600;color:var(--accent);padding:14px 16px 4px;letter-spacing:.02em}
.routine-banner{
  font-size:12px;font-weight:700;color:#fff;padding:10px 16px;margin:8px 0 0;border-radius:8px;letter-spacing:.03em;
}
.routine-banner.k8s{background:linear-gradient(90deg,var(--k8s),#6366f1)}
.routine-banner.host{background:linear-gradient(90deg,var(--host),#6366f1)}
.routine-banner:first-child{margin-top:0}
.cmd-row{
  display:grid;grid-template-columns:minmax(320px,1.35fr) minmax(220px,1fr);
  gap:16px;padding:9px 14px;border-bottom:1px solid var(--divider);
  cursor:pointer;transition:background .15s,box-shadow .15s;user-select:none;
}
.cmd-row:last-child{border-bottom:none}
.cmd-row:hover{background:var(--hover);box-shadow:inset 3px 0 0 var(--accent)}
.cmd-row.row-copied{background:#ecfdf5;box-shadow:inset 3px 0 0 #22c55e}
.cmd{
  font-size:12.5px;font-family:var(--mono);line-height:1.55;color:#0f3f5f;
  word-break:break-all;padding:7px 9px;background:#f8fafc;border-radius:7px;
  box-shadow:inset 0 0 0 1px rgba(15,23,42,.06);
}
.cmd.ctr-c{color:#9a3412;background:#fff7ed;border-color:#fed7aa}
.cmd.crictl-c{color:#5b21b6;background:#faf5ff;border-color:#e9d5ff}
.cmd.nerd-c{color:#065f46;background:#ecfdf5;border-color:#a7f3d0}
.var-ph{color:#1d4ed8;font-weight:600;background:rgba(37,99,235,.12);padding:1px 5px;border-radius:4px}
.desc{font-size:13px;color:var(--muted);line-height:1.55;padding-top:6px;pointer-events:none;letter-spacing:0}
.cmd-meta{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;min-width:0}
.cmd-copy-tip{
  flex-shrink:0;opacity:0;color:var(--accent);background:rgba(37,99,235,.08);
  border-radius:6px;padding:4px 7px;margin-top:3px;font-size:11px;font-weight:700;
  transition:opacity .15s;
}
.cmd-row:hover .cmd-copy-tip{opacity:1}
.risk-tag{
  display:inline-flex;align-items:center;margin-left:8px;padding:2px 6px;border-radius:999px;
  font-size:10px;font-weight:700;color:#b91c1c;background:#fee2e2;vertical-align:1px;
}
.toast{

const toolKeys = Object.keys(tools);
let activeTool = "k8s";
let activeCat = "全部";
let activeSubCat = "全部";
let searchQ = "";
/** 复制时是否保留 <name> <ns> <image> 等占位符，默认 true */
let copyWithVars = true;
/** 折叠状态：key = tool:分类名，true=折叠 */
const foldState = {};

function stripCopyPlaceholders(cmd){
  let s=String(cmd).replace(/<[a-zA-Z0-9_.-]+>/g,'');
  s=s.replace(/\s+--namespace\s*$/i,'').replace(/\s+-n\s*$/i,'');
  s=s.replace(/\s+--\s*$/,'').replace(/\s+--\s+--/g,' --');
  s=s.replace(/\s{2,}/g,' ').replace(/ \/ /g,' ').replace(/\/\s+/g,'/').trim();
  return s;
}

function textForCopy(cmd){
  return copyWithVars ? String(cmd) : stripCopyPlaceholders(cmd);
}

function colorClass(item){ return item[2]||""; }

function hl(t,q){
  if(!q) return t;
  const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  return t.replace(re,'<span class="hl">$1</span>');
}

function renderToolTabs(){
  document.getElementById('tool-tabs').innerHTML = toolKeys.map(k=>{
    const t=tools[k];
    return `<button type="button" class="tool-tab${k===activeTool?' active':''}" data-tool="${k}" onclick="setTool('${k}')">${t.label}</button>`;
  }).join('');
  const descEl=document.getElementById('tool-desc');
  if(descEl) descEl.textContent=tools[activeTool].desc||'';
}

function activeGroupedCatName(){
  if(activeCat==="全部") return null;
  const v = tools[activeTool].cats[activeCat];
  return isGroupedCat(v) ? activeCat : null;
}

function isGlobalSearch(){ return !!searchQ.trim(); }

function panelTitle(){
  if(isGlobalSearch()) return `全局搜索：${searchQ}`;
  if(activeCat==="全部") return '全部';
  if(activeSubCat!=="全部") return `${activeCat} · ${activeSubCat}`;
  return activeCat;
}

function matchItem(item, q, cat, sub, toolLabel){
  if(!q) return true;
  const [cmd,desc]=item;
  if(cmd==='__routine__') return [desc,cat,sub||'',toolLabel||''].join(' ').toLowerCase().includes(q);
  const hay=[cmd,desc,cat,sub||'',toolLabel||''].join(' ').toLowerCase();
  return hay.includes(q);
}

function sideItemActive(cat, sub){
  if(activeCat==="全部" && cat==="全部") return true;
  if(activeCat!==cat) return false;
  if(sub==="全部" || !sub) return activeSubCat==="全部";
  return activeSubCat===sub;
}

function foldKey(cat){ return activeTool+':'+cat; }

/** foldState[k]===true 表示折叠；false 表示强制展开；未设置时只有当前分类展开 */
function isGroupExpanded(cat){
  const k=foldKey(cat);
  if(foldState[k]===true) return false;
  if(foldState[k]===false) return true;
  return activeCat===cat;
}

function renderSideMenu(){
  const nav=document.getElementById('side-menu');
  let html=`<button type="button" class="side-item side-item-all${sideItemActive('全部')?' active':''}" data-cat="全部">全部命令</button>`;
  for(const cat of Object.keys(tools[activeTool].cats)){
    const v=tools[activeTool].cats[cat];
    if(isGroupedCat(v)){
      const expanded=isGroupExpanded(cat);
      const subs=Object.keys(v);
      const parentActive=activeCat===cat;
      html+=`<div class="side-fold">
        <div class="side-fold-head${parentActive?' active-parent':''}">
          <button type="button" class="side-toggle" data-fold="${escAttr(cat)}" aria-expanded="${expanded?'true':'false'}" aria-label="${expanded?'收起':'展开'}子菜单">▶</button>
          <button type="button" class="side-fold-label" data-cat="${escAttr(cat)}" data-sub="全部">${cat}</button>
          <span class="side-fold-count">${subs.length}</span>
        </div>
        <div class="side-children${expanded?'':' collapsed'}" data-children="${escAttr(cat)}">
          <div class="side-children-inner">
          <button type="button" class="side-item sub-overview${sideItemActive(cat,'全部')?' active':''}" data-cat="${escAttr(cat)}" data-sub="全部">总览</button>`;
      for(const sub of subs){
        html+=`<button type="button" class="side-item${sideItemActive(cat,sub)?' active':''}" data-cat="${escAttr(cat)}" data-sub="${escAttr(sub)}">${sub}</button>`;
      }
      html+=`</div></div></div>`;
    }else{
      html+=`<button type="button" class="side-item${sideItemActive(cat)?' active':''}" data-cat="${escAttr(cat)}">${cat}</button>`;
    }
  }
  nav.innerHTML=html;
  nav.querySelectorAll('.side-toggle').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const cat=btn.getAttribute('data-fold');
      const k=foldKey(cat);
      const expanded=isGroupExpanded(cat);
      foldState[k]=expanded;
      const box=btn.closest('.side-fold').querySelector('.side-children');
      if(box){
        box.classList.toggle('collapsed',expanded);
        btn.setAttribute('aria-expanded',expanded?'false':'true');
        btn.setAttribute('aria-label',expanded?'展开':'收起');
      }
    };
  });
  nav.querySelectorAll('[data-cat]').forEach(btn=>{
    btn.onclick=()=>{
      activeCat=btn.getAttribute('data-cat');
      activeSubCat=btn.getAttribute('data-sub')||'全部';
      if(activeCat!=='全部'&&isGroupedCat(tools[activeTool].cats[activeCat])){
        delete foldState[foldKey(activeCat)];
      }
      render();
    };
  });
}

function setTool(k){ activeTool=k; activeCat="全部"; activeSubCat="全部"; render(); }
function filter(){ searchQ=document.getElementById('search').value.trim(); render(); }

function clearSearch(){
  const input=document.getElementById('search');
  searchQ='';
  if(input) input.value='';
  render();
}

function isGroupedCat(v){ return v && !Array.isArray(v) && typeof v === 'object'; }

function catSections(catValue){
  if(Array.isArray(catValue)) return [[null, catValue]];
  return Object.entries(catValue);
}

function escAttr(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;');
}

function showToast(msg){
  const el=document.getElementById('toast');
  if(!el) return;
  el.textContent=msg||'已复制到剪贴板';
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>el.classList.remove('show'),1600);
}

function isRiskCommand(cmd, desc){
  return /(--force|delete|rm |prune|vacuum|finalize|强制|删除|清理|高危|慎用|不可恢复)/i.test(`${cmd} ${desc}`);
}

function copyCmd(cmd, rowEl){
  const text=textForCopy(cmd);
  const done=()=>{
    showToast(copyWithVars?'已复制（含变量）':'已复制（已去掉变量）');
    if(rowEl){
      rowEl.classList.add('row-copied');
      setTimeout(()=>rowEl.classList.remove('row-copied'),900);
    }
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  }else fallbackCopy(text,done);
}

function fallbackCopy(text,done){
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){ showToast('复制失败，请手动选择'); }
  document.body.removeChild(ta);
}

function formatCmdHtml(cmd, q){
  return cmd.split(/(<[^<>\s]+>)/g).map(part=>{
    if(/^<[^<>\s]+>$/.test(part))
      return `<span class="var-ph">${part.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;
    return hl(part,q);
  }).join('');
}

function routineBannerClass(toolKey){
  return toolKey==='host'?'routine-banner host':'routine-banner k8s';
}

function renderRows(items, q, toolKey){
  const tk=toolKey||activeTool;
  const bannerCls=routineBannerClass(tk);
  return items.map(item=>{
    const [cmd,desc,cc]=item;
    if(cmd==='__routine__'){
      return `<div class="${bannerCls}">${hl(desc,q)}</div>`;
    }
    const attr=escAttr(cmd);
    const risk=isRiskCommand(cmd, desc);
    return `<div class="cmd-row" data-copy="${attr}" title="点击复制">
      <code class="cmd ${cc||''}">${formatCmdHtml(cmd,q)}</code>
      <div class="cmd-meta">
        <div class="desc">${hl(desc,q)}${risk?'<span class="risk-tag">慎用</span>':''}</div>
        <span class="cmd-copy-tip" aria-hidden="true">复制</span>
      </div>
    </div>`;
  }).join('');
}

function renderGlobalSearch(q){
  let total=0;
  let blocks='';
  for(const tk of toolKeys){
    const tool=tools[tk];
    let toolCards='';
    for(const cat of Object.keys(tool.cats)){
      const sections=catSections(tool.cats[cat]);
      let catBody='';
      sections.forEach(([sub,items])=>{
        const filtered=items.filter(it=>matchItem(it,q,cat,sub,tool.label));
        if(!filtered.length) return;
        total+=filtered.filter(it=>it[0]!=='__routine__').length;
        const subLabel=sub?`<div class="sub-title">${hl(sub,searchQ)}</div>`:'';
        catBody+=subLabel+renderRows(filtered,searchQ,tk);
      });
      if(!catBody) continue;
      toolCards+=`<div class="card"><div class="sec-title">${hl(cat,searchQ)}</div>${catBody}</div>`;
    }
    if(!toolCards) continue;
    blocks+=`<section class="search-tool-block">
      <div class="tool-banner" data-tool="${tk}">${tool.label}</div>${toolCards}</section>`;
  }
  return {html:blocks,total};
}

function renderScoped(){
  const catData=tools[activeTool].cats;
  const catKeys=Object.keys(catData).filter(c=>activeCat==="全部"||c===activeCat);
  let total=0;
  const html=catKeys.map(cat=>{
    const sections=catSections(catData[cat]);
    const gName=activeGroupedCatName();
    const filterSub=gName && cat===gName && activeSubCat!=="全部";
    let body='';
    sections.forEach(([sub,items])=>{
      if(filterSub && sub!==activeSubCat) return;
      total+=items.filter(it=>it[0]!=='__routine__').length;
      if(sub && !filterSub) body+=`<div class="sub-title">${sub}</div>`;
      body+=renderRows(items,'',activeTool);
    });
    if(!body) return '';
    const showSec=activeCat==="全部";
    const secLabel=filterSub?`${cat} · ${activeSubCat}`:cat;
    return `<div class="card">${showSec?`<div class="sec-title">${secLabel}</div>`:''}${body}</div>`;
  }).join('');
  return {html,total};
}

function render(){
  renderToolTabs();
  renderSideMenu();
  const q=searchQ.trim().toLowerCase();
  const global=isGlobalSearch();
  const {html,total}=global ? renderGlobalSearch(q) : renderScoped();

  document.getElementById('count').textContent=`${total} 条命令`;
  document.getElementById('panel-title').textContent=panelTitle();
  document.getElementById('content').innerHTML=html||`<div class="empty">没有匹配的命令</div>`;
}

document.addEventListener('keydown', e=>{
  const tag=(e.target && e.target.tagName || '').toLowerCase();
  const isTyping=tag==='input' || tag==='textarea';
  if(e.key==='/' && !isTyping){
    e.preventDefault();
    document.getElementById('search')?.focus();
    return;
  }
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase()==='k'){
    e.preventDefault();
    document.getElementById('search')?.focus();
    document.getElementById('search')?.select();
    return;
  }
  if(e.key==='Escape' && document.activeElement?.id==='search'){
    e.preventDefault();
    clearSearch();
    document.getElementById('search')?.blur();
  }
});

## 输出模式（二选一，严格遵守）

### 模式 A：场景不明确时 — 必须先追问
当无法确定运行环境（容器/K8s/systemd/RPM/二进制等）、缺少关键信息时，**只输出追问**，不要给命令：
[需要确认]
（一句简洁问题）
- 选项1：简短说明
- 选项2：简短说明
（2～4 个选项，每条以 - 开头）

### 模式 B：场景明确时 — 输出一站式排查方案
只针对**一个**已确认的场景，给出按顺序执行的排查步骤（通常 3～6 步，不要堆砌无关命令）：
[排查方案] 场景标题（如：Kubernetes Pod CrashLoopBackOff 排查）

#### 步骤 1 · 步骤名称
这一步要确认什么（一行说明）
\`\`\`bash
命令
\`\`\`

#### 步骤 2 · 步骤名称
说明
\`\`\`bash
命令
\`\`\`

（依此类推，步骤编号连续）

## 硬性规则
1. 占位符统一：<ns> <name> <pod> <node> <port> <image> <host> <dir> <service> <bin> <archive>；kubectl 的 -n <ns> 放命令末尾
2. 每条命令独立一个 bash 代码块；不要输出整段脚本文件；不要编造不存在的脚本名
3. 同一轮不要并列输出「容器版 + 二进制版 + RPM 版」全部命令；不确定时用模式 A 追问
4. 危险操作（删命名空间、强制删 Pod）须在步骤说明中注明慎用
5. 除 [需要确认] / [排查方案] / 步骤标题 / 代码块外，不要输出冗长教程`;

let aiLastCommands = [];
let aiChatHistory = [];
let aiAwaitingClarify = false;

function extractCommandsFromMarkdown(text){
  const cmds = [];
  const re = /```(?:bash|sh|shell|console)?\s*\n?([\s\S]*?)```/gi;
  let m;
  while((m = re.exec(text))){
    const block = m[1].trim();
    if(block) cmds.push(block);
  }
  if(!cmds.length){
    const lines = text.split('\n').map(l=>l.trim()).filter(l=>l && !l.startsWith('#') && !/^[\-*#]/.test(l));
    if(lines.length && lines.some(l=>/^(kubectl|docker|systemctl|journalctl|crictl|ctr|nerdctl|ansible|curl|grep|ss |ls |find |tar )/.test(l))){
      cmds.push(lines.join('\n'));
    }
  }
  return cmds;
}

function parseAiClarify(text){
  const body = text.replace(/^\[需要确认\]\s*/i, '').trim();
  const options = [];
  const questionLines = [];
  for(const line of body.split('\n')){
    const opt = line.match(/^[-*•]\s+(.+)/);
    if(opt) options.push(opt[1].replace(/\*\*/g, '').trim());
    else if(line.trim() && !/^#/.test(line.trim())) questionLines.push(line.trim());
  }
  return { type:'clarify', question:questionLines.join('\n') || '请补充以下信息', options };
}

function parseAiPlaybook(text){
  const titleMatch = text.match(/\[排查方案\]\s*([^\n]+)/i);
  const title = titleMatch ? titleMatch[1].trim() : '排查方案';
  const steps = [];
  const stepRe = /(?:^|\n)(?:#{1,4}\s*)?(?:\*\*)?步骤\s*(\d+)\s*[·\.：:]\s*([^\n*]+?)(?:\*\*)?(?:\n([^\n`#][^\n]*))?\n```(?:bash|sh|shell|console)?\s*\n?([\s\S]*?)```/gi;
  let m;
  while((m = stepRe.exec(text))){
    steps.push({
      num: parseInt(m[1], 10),
      title: m[2].trim(),
      desc: (m[3] || '').trim(),
      cmd: m[4].trim()
    });
  }
  if(!steps.length){
    const cmds = extractCommandsFromMarkdown(text);
    cmds.forEach((cmd, i)=>{
      steps.push({ num:i + 1, title:'', desc:'', cmd });
    });
  }
  return { type:'playbook', title, steps, raw:text };
}

function parseAiResponse(content){
  const t = (content || '').trim();
  if(/\[需要确认\]/i.test(t)) return parseAiClarify(t);
  if(/\[排查方案\]/i.test(t) || /步骤\s*\d+/i.test(t)) return parseAiPlaybook(t);
  const cmds = extractCommandsFromMarkdown(t);
  if(cmds.length){
    return {
      type:'playbook',
      title:'命令方案',
      steps: cmds.map((cmd, i)=>({ num:i + 1, title:'', desc:'', cmd })),
      raw:t
    };
  }
  return { type:'raw', raw:t };
}

function bindAiStepCopy(container){
  container.querySelectorAll('.ai-step-cmd').forEach(el=>{
    el.addEventListener('click', ()=>{
      const idx = parseInt(el.getAttribute('data-ai-idx'), 10);
      const cmd = aiLastCommands[idx] || el.textContent;
      copyText(textForCopy(cmd), el);
    });
  });
  const copyAll = container.querySelector('.ai-copy-all');
  if(copyAll){
    copyAll.addEventListener('click', ()=>{
      const all = aiLastCommands.map(c=>textForCopy(c)).join('\n');
      copyText(all, null);
    });
  }
}

function renderAiClarification(parsed){

function renderAiPlaybook(parsed){
  aiLastCommands = parsed.steps.map(s=>s.cmd).filter(Boolean);
  const box = document.getElementById('ai-results');
  if(!parsed.steps.length){
    box.innerHTML = `<div class="ai-result-fallback"><pre>${escHtml(parsed.raw || '')}</pre></div>`;
    box.querySelector('pre')?.addEventListener('click', function(){ copyText(this.textContent, this); });
    return;
  }
  const stepsHtml = parsed.steps.map((s, i)=>`
    <div class="ai-step">
      <div class="ai-step-num">${s.num || i + 1}</div>
      <div class="ai-step-body">
        ${s.title ? `<div class="ai-step-title">${escHtml(s.title)}</div>` : ''}
        ${s.desc ? `<div class="ai-step-desc">${escHtml(s.desc)}</div>` : ''}
        <div class="ai-step-cmd" data-ai-idx="${i}">${formatCmdHtml(s.cmd, '')}</div>
      </div>
    </div>`).join('');
  box.innerHTML = `
    <div class="ai-playbook">
      <div class="ai-playbook-head">
        <div>
          <div class="ai-playbook-title">${escHtml(parsed.title)}</div>
          <div class="ai-playbook-meta">共 ${parsed.steps.length} 步 · 按顺序执行 · 点击命令复制</div>
        </div>
        <button type="button" class="ai-copy-all">复制全部</button>
      </div>
      <div class="ai-steps">${stepsHtml}</div>
    </div>`;
  bindAiStepCopy(box);
}

function renderAiResponse(content){
  const parsed = parseAiResponse(content);
  aiAwaitingClarify = parsed.type === 'clarify';
  if(parsed.type === 'clarify'){
    renderAiClarification(parsed);
    setAiStatus('请先确认场景，以便生成精准排查命令');
    return;
  }
  if(parsed.type === 'playbook'){
    renderAiPlaybook(parsed);
    setAiStatus(`已生成「${parsed.title}」· ${parsed.steps.length} 步排查流程`);
    return;
  }
  const box = document.getElementById('ai-results');
  box.innerHTML = `<div class="ai-result-fallback"><pre>${escHtml(parsed.raw || content || '')}</pre></div>`;
  box.querySelector('pre')?.addEventListener('click', function(){ copyText(this.textContent, this); });
  setAiStatus('已返回结果，点击内容可复制');
}

function resetAiConversation(){
  aiChatHistory = [];
  aiAwaitingClarify = false;
  aiLastCommands = [];
  document.getElementById('ai-results').innerHTML = '';
  setAiStatus('');
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyText(text, el){
  const done = ()=>{
    showToast(copyWithVars ? '已复制（含变量）' : '已复制（已去掉变量）');
    if(el){
      el.classList.add('copied');
      setTimeout(()=>el.classList.remove('copied'),800);
    }
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done));
  } else fallbackCopy(text, done);
}

async function generateAiCommands(overrideInput){
  const fromOverride = typeof overrideInput === 'string';
  const input = (fromOverride ? overrideInput : document.getElementById('ai-user-input').value).trim();
  if(!input){ setAiStatus('请先描述你想要的命令场景', true); return; }
  const cfg = loadAiConfig();
  const key = document.getElementById('ai-api-key').value.trim() || cfg.key;
  const url = (document.getElementById('ai-api-url').value.trim() || cfg.url).replace(/\/+$/,'');
  const model = document.getElementById('ai-api-model').value.trim() || cfg.model;
  if(!key){ setAiStatus('请先在 API 配置中填写 Key 并保存', true); return; }
  saveAiConfigFromForm(true);

  if(!aiAwaitingClarify && !fromOverride) resetAiConversation();

  aiChatHistory.push({ role:'user', content: input });

  const btn = document.getElementById('ai-generate');
  btn.disabled = true;
  setAiStatus('正在分析场景并生成排查方案…', false, true);
  document.getElementById('ai-results').innerHTML = '';

  try{
    const endpoint = url + '/chat/completions';
    const res = await fetch(endpoint, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer ' + key
      },
      body: JSON.stringify({
        model,
        temperature: 0.2,
        messages:[
          { role:'system', content: AI_SYSTEM },
          ...aiChatHistory
        ]
      })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
      aiChatHistory.pop();
      const errMsg = data.error?.message || data.message || res.statusText || ('HTTP ' + res.status);
      throw new Error(errMsg);
    }
    const content = data.choices?.[0]?.message?.content || '';
    if(!content) throw new Error('模型返回为空');
    aiChatHistory.push({ role:'assistant', content });
    renderAiResponse(content);
  }catch(e){
    setAiStatus('请求失败：' + (e.message || e), true);
  }finally{
    btn.disabled = false;
  }
}
